<div class="row d-flex flex-column mx-0 mb-3">
    <strong class="description w-100 text-align-center">{{annexureData?.name}}</strong>
    <pre class="custom-pre-tag-with-spaces m-0 w-100">{{annexureData?.description}}</pre>
</div>

<div *ngFor="let q of questions; let i = index" class="mb-4">
    <label for="question">
        <div class="row d-flex m-0" style="font-weight: 600;">
            {{ i + 1 }}.
            <pre class="custom-pre-tag-with-spaces m-0">{{ q.question }}</pre>
            <span *ngIf="q.isMandatory === 'Y'" style="color:red">*</span>
        </div>
    </label>

    <!-- MCQ WITH SINGLE (Radio Buttons) -->
    <div class="d-flex flex-wrap mt-2" *ngIf="q.answerType === answerType.MCQ_WITH_SINGLE">
        <div class="form-check mr-3" *ngFor="let a of q.answers">
            <input class="form-check-input" type="radio" [name]="a.answerFormId" [id]="a.answerFormId"
                [(ngModel)]="q.userAnswer" [checked]="isAnswerSelected(q.questionId, a.answerId)" [value]="a.answerId"
                [disabled]="annexureData.isDisabled" />
            <label class="form-check-label" [for]="a.answerFormId">
                {{ a.answer }}
            </label>
        </div>
    </div>

    <!-- MCQ WITH MULTIPLE (Checkboxes) -->
    <div class="d-flex flex-wrap mt-2" *ngIf="q.answerType === answerType.MCQ_WITH_MULTIPLE">
        <div class="form-check mr-3" *ngFor="let a of q.answers">
            <input class="form-check-input" type="checkbox" [id]="a.answerFormId" [disabled]="annexureData.isDisabled"
                [checked]="isAnswerSelected(q.questionId, a.answerId)"
                (change)="handleMultipleAnswer($event, q.questionId, a.answerId)" />
            <label class="form-check-label" [for]="a.answerFormId">
                {{ a.answer }}
            </label>
        </div>
    </div>

    <!-- DESCRIPTIVE (Textarea) -->
    <div class="mt-2" *ngIf="q.answerType === answerType.DESCRIPTIVE" style="margin-right: 15px;">
        <ng-container *ngIf="annexureData.isDisabled">
            <div class="comment-area w-100">
                <pre class="custom-pre-tag-with-spaces m-0">{{q.userAnswer}}</pre>
            </div>
        </ng-container>
        <ng-container *ngIf="!annexureData.isDisabled">
            <textarea class="form-control comment-area" [(ngModel)]="q.userAnswer"
                [disabled]="annexureData.isDisabled"></textarea>
        </ng-container>
    </div>

    <!-- DESCRIPTIVE WITH SUB QUESTION -->
    <div class="mt-2" *ngIf="q.answerType === answerType.DESCRIPTIVE_WITH_SUB_QUESTION">
        <div class="d-flex flex-column">
            <div *ngFor="let a of q.answers" class="row d-flex align-items-center mb-2 mx-0"
                style="padding-left: 20px;">
                <div class="col-md-4 pl-0 pr-2">
                    <label for="subQuestion" class="mb-0 d-flex align-items-center">
                        <pre class="custom-pre-tag-with-spaces m-0" style="font-weight: 500;">{{ a.answer }}</pre>
                        <span *ngIf="q.isMandatory === 'Y'" style="color:red" class="ml-1">*</span>
                    </label>
                </div>
                <div class="col-md-8 p-0">
                    <ng-container *ngIf="annexureData.isDisabled">
                        <div class="comment-area w-100">
                            <pre class="custom-pre-tag-with-spaces m-0">{{a.userAnswer}}</pre>
                        </div>
                    </ng-container>
                    <ng-container *ngIf="!annexureData.isDisabled">
                        <textarea class="form-control comment-area" [id]="a.answerFormId" [(ngModel)]="a.userAnswer"
                            [disabled]="annexureData.isDisabled"></textarea>
                    </ng-container>
                </div>
            </div>
        </div>
    </div>

    <!-- DESCRIPTIVE WITH MCQ QUESTION -->
    <div class="d-flex flex-wrap mt-2" *ngIf="q.answerType === answerType.DESCRIPTIVE_WITH_MCQ_QUESTION">
        <div class="row d-flex align-items-center mx-0 my-2" style="padding-left: 20px;" *ngFor="let a of q.answers">
            <label class="form-check-label" [for]="a.answerFormId">
                {{ a.answer }}
            </label>
            <div class="row d-flex mx-2 border border-1">
                <div class="p-1">Yes</div>
                <button class="py-1 px-2 yesno-btn-sm" (click)="handleYesNoAnswer(q, a.answerId, 'Y')"
                    [disabled]="annexureData.isDisabled">{{isYesNoSelected(a,'Y')}}</button>
                <div class="p-1">No</div>
                <button class="py-1 px-2 yesno-btn-sm" (click)="handleYesNoAnswer(q, a.answerId, 'N')"
                    [disabled]="annexureData.isDisabled">{{isYesNoSelected(a,'N')}}</button>
            </div>
        </div>
    </div>

    <div class="row d-flex mx-0 p-1 ml-3 mr-0">
        <strong *ngIf="getErrorMsg(q.questionId)" class="text-danger">
            {{getErrorMsg(q.questionId)}}
        </strong>
    </div>
</div>

<div class="mt-3 d-flex justify-content-end" *ngIf="!annexureData.isDisabled">
    <button type="button" mdbBtn size="sm" color="info" class="mr-2" (click)="onSubmit()"
        [mdbTooltip]="'Save Annexure'">
        {{isNewAnnexure() ? "Submit" : "Update"}}
    </button>
    <button type="button" mdbBtn size="sm" color="info" class="mr-2" (click)="onCancel()">Cancel</button>

</div>
