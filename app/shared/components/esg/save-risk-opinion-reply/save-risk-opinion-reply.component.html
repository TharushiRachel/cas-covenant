<div class="modal-header modal-topic">
    <h4 class="modal-title w-100 font-weight-bold">{{heading}}</h4>
    <button type="button" class="close" data-dismiss="modal" aria-label="Close" (click)="mdbModalRef.hide()">
        <span aria-hidden="true">&times;</span>
    </button>
</div>

<div class="modal-body">
    <textarea id="custom-html-editor-v3" name="tiny-mce-content">
    </textarea>
</div>

<div class="modal-footer">
    <button mdbBtn color="secondary" class="waves-light" mdbWavesEffect size="sm" (click)="onSave()">
        Save
    </button>
</div>
