<div class="w-100-p h-100-p d-flex flex-column justify-content-start">

  <form method="post" class="w-100-p">
    <textarea id="custom-html-editor-v2" name="tiny-mce-content">
    </textarea>
  </form>

  <div class="w-100-p d-flex flex-row justify-content-end align-content-center">
    <button style="display: none;" id="app-tiny-mce-editor-save-close" (click)="onCloseSaveContent()">
    </button>
    <button style="display: none;" id="app-tiny-mce-editor-save-notify" (click)="onNotifySaveContent()">
    </button>
    <button *ngIf="isSaveEnabled" (click)="onSave()" mdbBtn color="info" class="my-4 editor-save-btn" id="app-tiny-mce-editor-save">{{actionName ?
      actionName : 'Save'}}
    </button>
    <ng-container *ngIf="isSaveAndCloseEnabled">
      <button (click)="onSaveAndClose()" mdbBtn color="info" class="my-4 editor-save-btn">Save & Close
      </button>
    </ng-container>
  </div>
</div>
