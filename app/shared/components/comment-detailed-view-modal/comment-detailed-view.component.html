<div class="modal-header modal-topic">
  <button type="button" class="close pull-right" aria-label="Close" (click)="onNoClick()">
    <span aria-hidden="true">×</span>
  </button>
  <h4 class="modal-title w-100 heading-align font-weight-bold" id="myModalLabel">{{heading}}</h4>
</div>
<div class="modal-body">
  <div class="row mt-1 mb-2">
    <!-- <div class="col-2">
       <label class="text-muted"> Comment: &nbsp; </label>
     </div>-->
    <div class="col-12">
      <span [innerHTML]="comment | safeHtml"></span>
    </div>
  </div>

  <div class="d-flex justify-content-between">
    <div class="">
      <label class="text-muted"> Commented By: &nbsp;</label><label>{{commentedBy || '-'}}</label>
    </div>
    <div class="">
      <label class="text-muted"> Commented Date: &nbsp; </label><label>{{commentedDate || '-'}}</label>
    </div>
  </div>

</div>
<div class="modal-footer">
  <div class="row">
    <div class="col-4">
      <button type="button" class="btn btn-secondary" (click)="onNoClick()">
        Close
      </button>
    </div>
  </div>

</div>
