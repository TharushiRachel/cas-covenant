<div class="modal-header modal-topic flex-center">
  <button type="button" class="close pull-right" aria-label="Close" (click)="close()">
    <span aria-hidden="true">×</span>
  </button>
  <p class="modal-title w-100 heading-align font-weight-bold" style="font-size: 1.1rem"
     id="myModalLabel">{{heading}}{{applicationForm.afRefNumber}}</p>
</div>
<div class="modal-body modal-detail form-margin">
  <div>
    <form
      class="d-flex flex-row flex-fill flex-wrap align-items-center"
      [formGroup]="componentForm">
      <div class="d-flex w-100-p  p-2 branch-name">
        <p>Branch Name</p>
      </div>

      <div class="d-flex w-100-p  p-2 m-bottom-20px">
        <div class="md-form min-width-120 mr-3 flex-fill">
          <input
            id="branchName"
            formControlName="branchName"
            type="text"
            class="completer-input form-control mdb-autocomplete mb-0"
            [mdbAutoCompleter]="auto"
          />
          <mdb-auto-completer #auto="mdbAutoCompleter" textNoResults="No Branch(s) Found">
            <ng-container *ngFor="let option of results | async">
              <mdb-option [value]="option.branchName">
                {{ option.branchName }}
              </mdb-option>
            </ng-container>
          </mdb-auto-completer>

          <mdb-error *ngIf="formErrors.branchName.required">Enter your branch name</mdb-error>

        </div>
      </div>
      <div class="d-flex w-100-p  p-2">
        <div class="md-form min-width-120 mr-3 flex-fill">
          <label for="workFlow">Work Flow</label>
          <mdb-select
            id="workFlow"
            [options]="templateOption"
            formControlName="workFlow"
            placeholder="Work Flow"></mdb-select>

          <mdb-error *ngIf="formErrors.workFlow.required">Required</mdb-error>

        </div>
      </div>
    </form>
  </div>
  <div class="modal-footer modal-end">
    <button type="button"
            mdbBtn
            class="medium-button"
            aria-label="Close"
            (click)="close()"
            mdbWavesEffect>Close
    </button>
    <button
      type="button"
      mdbBtn
      color="secondary"
      class="relative medium-button"
      [disabled]="!isValid()"
      (click)="copy()"
      mdbWavesEffect>Copy
    </button>
  </div>
</div>
