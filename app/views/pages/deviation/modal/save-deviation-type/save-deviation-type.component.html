<div class="modal-header modal-topic flex-center">
    <button type="button" class="close pull-right" aria-label="Close" (click)="onClose()">
        <span aria-hidden="true">×</span>
    </button>
    <h4 class="modal-title w-100 heading-align" id="myModalLabel" style="font-size: 1rem ; font-weight: bold">
        Add / Edit Deviation Type
    </h4>
</div>
<div class="modal-body modal-detail form-margin mt-0 px-3"
    style="min-height: 20vh; max-height: 80vh; overflow-y: auto;">
    <div class="row d-flex flex-row mx-0 my-3">
        <div class="col-md-6">
            <div class="md-form">
                <input class="form-control" id="type" [(ngModel)]="formData.deviationType" type="text" mdbInput
                    style="margin-top: 2px;">
                <label for="type">Type *</label>
                <mdb-error *ngIf="errors.type">{{errors.deviationType}}</mdb-error>
            </div>
        </div>
        <div class="col-md-6">
            <div class="md-form">
                <mdb-select [allowClear]="true" [options]="statusOptions" [(ngModel)]="formData.status"
                    class="form-control py-0" label="Status">
                </mdb-select>
            </div>
        </div>
    </div>
</div>

<div class="modal-footer modal-end pt-0 border border-top-1">
    <button type="button" mdbBtn color="info" size="sm" class="waves-light" mdbWavesEffect
        (click)="handleSave()" [disabled]="!isSaveEnabled()">
        Save
    </button>
</div>
