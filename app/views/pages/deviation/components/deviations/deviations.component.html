<div mdbSticky class="d-flex flex-row justify-content-between page-header">
    <div class="d-flex flex-row align-items-center">
        <h5><i class="fas fa-dice-d20 header-icon"></i> Deviation(s)</h5>
    </div>

    <div class="d-flex flex-row align-items-center">
        <ng-container>
            <button (click)="openAddEditModal()" class="custom-button" mdbBtn type="button" color="default"
                outline="true" mdbWavesEffect>
                Add New Deviation
            </button>
        </ng-container>
    </div>
</div>

<ng-container *ngIf="deviations.length > 0;else emptyView">
    <div class="section table-responsive mb-15p pool-table">
        <table class="table">
            <thead>
                <tr>
                    <ng-container *ngFor="let col of tableColumns">
                        <th scope="col">{{col}}</th>
                    </ng-container>
                </tr>
            </thead>
            <tbody>
                <ng-container *ngFor="let deviation of deviations">
                    <tr class="table-clickable-row deviation-item">
                        <td>{{deviation.deviationType}}</td>
                        <td>{{deviation.description}}</td>
                        <td>
                            <span [class.color-green]="deviation.status === statusConst.ACT"
                                [class.color-red]="deviation.status === statusConst.INA">
                                {{status[deviation.status]}}
                            </span>
                            <span class="ml-1 mr-0" *ngIf="deviation.isTempRecord">
                                <mdb-badge style="color: #ffc107 !important;border-color: #ffc107 !important;">
                                    Pending
                                </mdb-badge>
                            </span>
                        </td>
                        <td>
                            <div class="row d-flex mx-0">

                                <!-- Edit -->
                                <button class="btn" mdbTooltip="Edit"
                                    *ngIf="!deviation.isTempRecord && !isPendingExist(deviation)"
                                    (click)="openAddEditModal(deviation)">
                                    <mdb-icon fas icon="pencil-alt"></mdb-icon>
                                </button>

                                <!-- Authorize -->
                                <ng-container *ngIf="isValidUser(deviation)">
                                    <button class="btn" mdbTooltip="Approve"
                                        (click)="handleAuthorized(deviation,'APPROVED')">
                                        <mdb-icon fas icon="check-circle" style="color: #28a745;"></mdb-icon>
                                    </button>
                                    <button class="btn" mdbTooltip="Reject"
                                        (click)="handleAuthorized(deviation,'REJECT')">
                                        <mdb-icon fas icon="times-circle" style="color: #dc3545;"></mdb-icon>
                                    </button>
                                </ng-container>

                            </div>
                        </td>
                    </tr>
                </ng-container>
            </tbody>
        </table>
    </div>
</ng-container>
<ng-template #emptyView>
    <div class="row d-flex mx-0 justify-content-center">
        There are no data found.
    </div>
</ng-template>
