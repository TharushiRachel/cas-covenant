<mdb-card>
  <mdb-card-body class="custom-card-body minimum-height">
    <ng-container>
      <form [formGroup]="declarationForm">
        <div class="d-flex flex-row justify-content-between w-100-p">
          <div class="d-flex flex-column justify-content-between w-100-p">
            <div>
              Have you had any judgements, writs or legal proceedings against you?
            </div>
            <div class="d-flex flex-row justify-content-between m-top-div">
              <div class="d-flex flex-row justify-content-between width-14">
                <input type="radio" class="form-check-input"
                       formControlName="declaration"
                       id="{yes}"
                       [value]="'Y'"
                       name="declaration">
                <label class="form-check-label" for="{yes}">Yes</label>

                <input type="radio" class="form-check-input"
                       formControlName="declaration"
                       id="{no}"
                       [value]="'N'"
                       name="declaration">
                <label class="form-check-label" for="{no}">No</label>
              </div>
            </div>
            <div class="md-form w-40-p mt-10p">
              <mdb-select
                [options]="selectUser"
                formControlName="selectUser"
                id="selectUser"
                class="m-top-8px"
                label="Select User *"
              ></mdb-select>
              <!--                <label for="selectUser">Select User *</label>-->
            </div>

            <div>
              <button mdbBtn size="sm" color="secondary">Save</button>
              <button mdbBtn size="sm" color="secondary">Pdf</button>
              <button mdbBtn size="sm" color="secondary">Submit</button>
            </div>
          </div>
        </div>
      </form>
    </ng-container>
  </mdb-card-body>
</mdb-card>
