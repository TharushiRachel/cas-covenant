<div class="modal-header modal-topic flex-center">
  <h4 class="modal-title w-100 font-weight-bold">
    {{heading}}
  </h4>
  <button type="button" class="close" data-dismiss="modal" aria-label="Close" (click)="mdbModalRef.hide()">
    <span aria-hidden="true">&times;</span>
  </button>
</div>

<div class="modal-body modal-detail form-margin">
  <form class="d-flex p-2 flex-column justify-content-center align-items-start w-100-p" [formGroup]="componentForm">
    <div class="d-flex flex-row flex-wrap w-100-p justify-content-around">
      <input type="radio" class="form-check-input"
             id="selectDirect" [value]="applicationFormForwardType.DIRECT"
             formControlName="forwardType"
             name="forwardType">
      <label class="form-check-label" for="selectDirect">Direct User</label>

      <input type="radio" class="form-check-input"
             formControlName="forwardType"
             id="selectDepartment" [value]="applicationFormForwardType.CLUSTER"
             name="forwardType">
      <label class="form-check-label ml-20p" for="selectDepartment">User Groups</label>
    </div>

    <div class="d-flex m-top-10px flex-row flex-wrap w-100-p justify-content-between">
      <ng-container *ngIf="forwardType==applicationFormForwardType.CLUSTER">
        <div class="md-form m-top-10px m-bottom-10px w-48-p">
          <mdb-select
            [multiple]="true"
            [options]="userGroupOptions"
            formControlName="userGroup"
            id="userGroup"
            label="Group"></mdb-select>
          <mdb-error *ngIf="formError.userGroup.required">Required</mdb-error>
        </div>

        <div class="md-form m-top-10px m-bottom-10px w-48-p">
          <mdb-select
            [options]="departmentGroupOptions"
            formControlName="departmentGroup"
            id="departmentGroup"
            label="Branch/Departments"></mdb-select>
          <mdb-error *ngIf="formError.departmentGroup.required">Required</mdb-error>
        </div>
      </ng-container>

      <ng-container *ngIf="forwardType==applicationFormForwardType.DIRECT">
        <div class="md-form m-top-10px m-bottom-10px w-48-p">
          <mdb-select
            [options]="userGroupOptions"
            formControlName="group"
            id="group"
            label="Group">
          </mdb-select>
          <mdb-error *ngIf="formError.group.required">Required</mdb-error>
        </div>
        <div class="md-form m-top-10px m-bottom-10px w-48-p">
          <mdb-select
            [options]="userOption"
            formControlName="user"
            id="user"
            label="User"></mdb-select>
          <mdb-error *ngIf="userOption.length<=0 && groupValChange ">No users for selected group</mdb-error>
          <mdb-error *ngIf="formError.user.required">Required</mdb-error>
        </div>
      </ng-container>

    </div>


    <div class="d-flex flex-row w-100-p">
      <div class="md-form m-top-10px m-bottom-10px w-100-p ">
        <label for="comment" style="color: black"></label>
        <textarea type="text"
                  class="form-control rounded-0 comment-area"
                  id="comment"
                  placeholder="Comment here..."
                  formControlName="comment"
                  maxlength="4000"
                  rows="5" mdbInput>
        </textarea>
        <!--        <mdb-error *ngIf="formError.comment.maxLength">Max length is 4000</mdb-error>-->
      </div>
    </div>
  </form>
</div>
<div class="modal-footer modal-end">
  <button
    type="button" mdbBtn color="light" class="btn-sm relative waves-light" mdbWavesEffect
    (click)="mdbModalRef.hide()">Cancel
  </button>
  <button
    type="button" mdbBtn color="info" class="btn-sm relative waves-light" mdbWavesEffect
    [disabled]="!isValid()" (click)="forward()">Froward
  </button>

</div>
