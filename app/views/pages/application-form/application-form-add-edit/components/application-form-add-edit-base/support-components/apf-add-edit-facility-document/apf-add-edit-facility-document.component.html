<div class="modal-header modal-topic">
  <h4 class="modal-title w-100 font-weight-bold">Upload Facility Document</h4>
  <button type="button" class="close" data-dismiss="modal" aria-label="Close" (click)="mdbModalRef.hide()">
    <span aria-hidden="true">&times;</span>
  </button>
</div>

<div class="modal-body mx-3 modal-detail form-margin">
  <form class="d-flex p-2 flex-column justify-content-start align-items-start w-100-p" [formGroup]="componentForm">

    <div class="d-flex w-100-p  p-2">
      <div class="md-form m-top-10px m-bottom-10px w-100-p input-size">
        <input mdbValidate type="text"
               id="documentName"
               maxlength="200"
               formControlName="documentName"
               class="form-control"
               placeholder="Choose Supporting Doc"
               [mdbAutoCompleter]="auto"
               mdbInput>

        <mdb-auto-completer #auto="mdbAutoCompleter" textNoResults="I have found no results :(">
          <mdb-option *ngFor="let option of result |async" [value]="option.documentName">
            {{ option.documentName}}
          </mdb-option>
        </mdb-auto-completer>
        <label for="documentName">Supporting Document</label>
        <mdb-error *ngIf="formErrors.documentName.required">Supporting Document required</mdb-error>
      </div>
    </div>
    <div class="d-flex w-100-p  p-2">
      <div class="md-form m-top-10px m-bottom-10px w-100-p input-size">
        <input mdbValidate type="text" id="remark" maxlength="200" formControlName="remark"
               class="form-control"
               mdbInput>
        <label for="remark">Remarks</label>
      </div>
    </div>

    <div class="input-group">
      <div class="input-group-prepend">
        <span class="input-group-text" id="inputGroupFileAddon01">Upload</span>
      </div>
      <div class="custom-file">
        <input type="file" class="custom-file-input" id="inputGroupFile01"
               aria-describedby="inputGroupFileAddon01"
               (change)="selectFile($event)">
        <label class="custom-file-label"
               for="inputGroupFile01">{{fileToUpload ? fileToUpload.name ? fileToUpload.name : 'Choose file' : 'Choose file'}}</label>
        <mdb-error *ngIf="fileUploadError.hasError">{{fileUploadError.errorMessage}}</mdb-error>
      </div>
    </div>
  </form>
</div>
<div class="modal-footer modal-end">
  <button type="button" mdbBtn color="secondary" size="sm" class="relative waves-light" mdbWavesEffect
          [disabled]="componentForm.invalid || !isValidUpload()" (click)="addFacilityDocument()">Upload
  </button>
</div>
