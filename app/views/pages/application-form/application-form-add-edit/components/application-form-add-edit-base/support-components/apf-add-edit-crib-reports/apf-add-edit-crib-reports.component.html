<div class="modal-header modal-topic">
  <button type="button" class="close pull-right" aria-label="Close" (click)="onNoClick()">
    <span aria-hidden="true">×</span>
  </button>
  <h4 class="modal-title w-100 heading-align font-weight-bold" id="myModalLabel">Create Application Form</h4>
</div>
<div class="modal-body">
  <form [formGroup]="cribReportForm" class="width-100" id="form-div">

    <div class="d-flex flex-row justify-content-between width-100 m-bottom-10px">

      <div class="md-form width-35 ">
        <mdb-select
          [options]="identityOptionSelect"
          formControlName="identificationType"
          id="identificationType"
          class="mt-8p"
          label="Identification Type">
        </mdb-select>
        <mdb-error *ngIf="formErrors.identificationType.required">Identification Type required</mdb-error>
      </div>

      <div class="md-form width-35 mt-12p">
        <input mdbValidate
               type="text"
               id="identificationNumber"
               maxlength="200"
               formControlName="identificationNumber"
               class="form-control"
               mdbInput
        >
        <label for="identificationNumber">NIC *</label>
      </div>

      <div class="md-form width-35">
        <mdb-date-picker class="form-control"
                         style="border: none !important;"
                         id="CRIBDate"
                         formControlName="CRIBDate"
                         [options]="myDatePickerOptions"
                         [inline]="true"
                         label="CRIB Date *"
        ></mdb-date-picker>
        <mdb-error *ngIf="formErrors.CRIBDate.required">Required</mdb-error>
      </div>
    </div>

    <div class="d-flex flex-row justify-content-start width-100 m-bottom-10px">

      <div class="md-form width-35">
        <mdb-select
          [options]="optionsCribStatusSelect"
          formControlName="cribStatus"
          required="cribStatus"
          id="cribStatus"
          class="mt-8p"
          label="CRIB Status"></mdb-select>
        <mdb-error *ngIf="formErrors.cribStatus.required">CRIB Status required</mdb-error>
      </div>

    </div>

    <div class="md-form m-top-10px m-bottom-10px w-100-p">
      <label for="comment" style="color: black"></label>
      <textarea type="text"
                id="comment"
                class="form-control rounded-0 comment-area"
                maxlength="4000"
                placeholder="Comment here..."
                formControlName="comment"
                appTextAreaAutoHeight
                mdbInput></textarea>

      <mdb-error *ngIf="formErrors.comment.maxlength">Maximum length for Comment
        is {{formErrors.comment.maxlength.requiredLength}}</mdb-error>
    </div>

    <div class="d-flex flex-column justify-content-center width-100 m-bottom-10px custom-body">
      <div class="text-align-center">
        <h6 class="">CRIB Details</h6>
      </div>
      <div id="printContentDiv" [innerHTML]="htmlContent | safeHtml"></div>
    </div>

    <div class="d-flex flex-row justify-content-end width-100 m-bottom-10px">
      <button
        type="button" mdbBtn color="light" class="btn-sm relative waves-light" mdbWavesEffect
        (click)="moveUp()">Move up
      </button>
    </div>

  </form>
</div>
<div class="modal-footer modal-end">
  <button
    type="button" mdbBtn color="light" class="btn-sm relative waves-light" mdbWavesEffect
    (click)="onNoClick()">Cancel
  </button>
  <button
    type="button" mdbBtn color="info" class="btn-sm relative waves-light" mdbWavesEffect
    [disabled]="!isValid()" (click)="saveCribReport()">Save
  </button>
</div>
