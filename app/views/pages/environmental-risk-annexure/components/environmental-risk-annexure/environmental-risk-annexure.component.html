<div mdbSticky class="d-flex flex-row justify-content-between page-header">
    <div class="d-flex flex-row align-items-center">
        <h5><i class="fas fa-dice-d20 header-icon"></i> Environmental Risk Annexure</h5>
    </div>

    <div class="d-flex flex-row align-items-center">
        <ng-container>
            <button class="custom-button" mdbBtn type="button" color="default" outline="true" mdbWavesEffect
                (click)="addEditAnnexure(null)">
                Add Annexure
            </button>
        </ng-container>
    </div>
</div>

<div class="w-100 m-0 p-3" *ngIf="annexes.length > 0">
    <div class="row d-flex mx- my-3 p-2 border border-1 rounded annex-item" *ngFor="let annex of annexes">
        <div class="col-md-8 row d-flex align-items-center mx-0">
            <span class="font-weight-bold">{{annex.name}}</span>

            <div class="ml-3 mr-0" *ngIf="annex.isMandatory === 'Y'">
                <mdb-badge default="true" style="color: #ffc107 !important;border-color: #ffc107 !important;">
                    Mandatory
                </mdb-badge>
            </div>

            <div class="ml-3 mr-0" *ngIf="annex.allowRiskEdit === 'Y'">
                <mdb-badge default="true" style="color: #17a2b8 !important;border-color: #17a2b8 !important;">
                    Allow Risk to Edit
                </mdb-badge>
            </div>

            <div class="ml-3 mr-0" *ngIf="isPendingAnnex(annex) && isInactiveAnnex(annex)">
                <mdb-badge default="true"
                    style="color: #dc3545 !important;border-color: #dc3545 !important;">Removed</mdb-badge>
            </div>
            <div class="ml-3 mr-0" *ngIf="isPendingAnnex(annex)">
                <mdb-badge default="true"
                    style="color: #ffc107 !important;border-color: #ffc107 !important;">Pending</mdb-badge>
            </div>
            <div class="ml-3 mr-0" *ngIf="isDraftAnnex(annex)">
                <mdb-badge default="true"
                    style="color: #ffc107 !important;border-color: #ffc107 !important;">Drafted</mdb-badge>
            </div>
        </div>
        <div class="col-md-4 row d-flex justify-content-end mx-0">
            <!-- View Question -->
            <button class="btn" *ngIf="annex.questions.length > 0" (click)="viewQuestions(annex)">
                View Questions
            </button>

            <!-- Edit -->
            <button class="btn" mdbTooltip="Edit"
                *ngIf="!isPendingAnnex(annex) && !isInactiveAnnex(annex) && isActionEnabled(annex)"
                (click)="addEditAnnexure(annex)">
                <mdb-icon fas icon="pencil-alt"></mdb-icon>
            </button>

            <!-- View / Authorize Pending -->
            <button class="btn" *ngIf="annex.pendingRec && isPendingAnnex(annex) && !isInactiveAnnex(annex)"
                (click)="viewPendingInfo(annex)" style="border: 2px solid #ffc107 !important; color: #ffc107;">
                View / Authorize Pending
            </button>

            <!-- Remove -->
            <button class="btn" mdbTooltip="Remove"
                *ngIf="!isPendingAnnex(annex) && !isInactiveAnnex(annex) && isActionEnabled(annex)"
                (click)="removeAnnex(annex)">
                <mdb-icon fas icon="trash-alt" style="color: #dc3545;"></mdb-icon>
            </button>

            <!-- Authorize -->
            <ng-container *ngIf="isAuthorizeEnabled(annex)">
                <button class="btn" mdbTooltip="Approve"
                    (click)="approveRejectAnnex(annex,approveStatusConst.APPROVED)">
                    <mdb-icon fas icon="check-circle" style="color: #28a745;"></mdb-icon>
                </button>
                <button class="btn" mdbTooltip="Reject" (click)="approveRejectAnnex(annex,approveStatusConst.REJECTED)">
                    <mdb-icon fas icon="times-circle" style="color: #dc3545;"></mdb-icon>
                </button>
            </ng-container>
        </div>
        <div class="col-md-8 my-2">
            <pre class="custom-pre-tag-with-spaces m-0">{{annex.description}}</pre>
        </div>
    </div>
</div>
