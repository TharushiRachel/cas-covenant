<div class="modal-header flex-center modal-topic">
  <h4 class="modal-title w-100 font-weight-bold">{{header}}</h4>
  <button type="button" class="close" data-dismiss="modal" aria-label="Close" (click)="close()">
    <span aria-hidden="true">&times;</span>
  </button>
</div>

<div class="modal-body mx-3">
  <div class="editor-container">

    <ng-container *ngIf="isTinyMCEEnabled">
      <app-tiny-mce-editor
        [actionName]="'Update Content'"
        [html]="givenData"
        [isScrollEnabled]="isScrollEnabled"
        (onContentSave)="update($event)"
      ></app-tiny-mce-editor>
    </ng-container>

    <ng-container *ngIf="!isTinyMCEEnabled">
      <app-rich-text-editor
        [html]="givenData"
        (onContentSave)="update($event)"
      ></app-rich-text-editor>
    </ng-container>

  </div>
</div>
