<div mdbSticky class="d-flex flex-row justify-content-between page-header">
  <div class="d-flex flex-row align-items-center">
    <h5><i class="fas fa-newspaper header-icon"></i> BCC/EAC Report(s)</h5>
  </div>
</div>

 <div class="d-flex flex-row justify-content-start align-items-center w-100-p flex-wrap" id="app-personal-customer-stat-wrapper">

  <div class="width-100">
    <app-tabs
      [selectedTabIndex]="selectedTabIndex"
      class="w-100-p customer-stat-tab" (onTabSelect)="onTabSelect($event)">

      <app-tab [tabTitle]="'Create Report'" class="customer-stat-tab">
        <ng-container *ngIf="isTabSelected(0)">
          <app-bcc-facility-paper-search>
          </app-bcc-facility-paper-search>
        </ng-container>
      </app-tab>

      <app-tab [tabTitle]="'Draft'">
        <ng-container *ngIf="isTabSelected(1)">
          <app-bcc-facility-paper-draft>
          </app-bcc-facility-paper-draft>
        </ng-container>
      </app-tab>
    </app-tabs>
  </div>

</div>
