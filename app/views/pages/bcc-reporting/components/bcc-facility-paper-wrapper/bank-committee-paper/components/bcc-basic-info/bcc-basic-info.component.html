<form [formGroup]="basicInfo">
  <div class="d-flex flex-row w-100-p mt-2">
    <div class="d-flex flex-column item-box">
      <div class="d-flex flex-row ">
        <p class="w-15">Branch/Cr Division</p>
        <p>:</p>
        <p class="w-35 data-lbl">
          <input mdbValidate
                 type="text"
                 id="branchDivision"
                 formControlName="createdBranchCode"
                 class="custom-text-input"
                 placeholder="Branch Division code"
                 mdbInput>
        </p>
      </div>
      <div class="d-flex flex-row">
        <p class="w-15">Name Of the Customer</p>
        <p>:</p>
        <p class="w-35 data-lbl">
          <input mdbValidate
                 type="text"
                 id="customerName"
                 formControlName="customerName"
                 class="custom-text-input"
                 placeholder="Customer Name"
                 mdbInput>
        </p>
      </div>

      <div class="d-flex flex-row">
        <p class="w-15">Risk Rating Year</p>
        <p>:</p>
        <div class="w-35 data-lbl md-form">
          <app-bcc-risk-rating-year
            [riskRatingYearGroup]="riskRatingYearGroup"
            (addRiskRatingYearFormRow)="addRiskRatingYearFormRow()"
            (removeRiskRatingYearFormRow)="removeRiskRatingYearRow($event)"
          >
          </app-bcc-risk-rating-year>
        </div>
      </div>
      <div class="d-flex flex-row">
        <p class="w-15">Business Profile</p>
        <p>:</p>
        <div class="w-85 data-lbl">
          <input mdbValidate
                 type="text"
                 id="businessProfile"
                 maxlength="255"
                 formControlName="businessProfile"
                 class="custom-text-input"
                 placeholder="Business Profile"
                 mdbInput>
        </div>
      </div>
      <div class="d-flex flex-row">
        <p class="w-15">Ownership / Directors</p>
        <p>:</p>
        <div class="w-85 data-lbl">
          <app-bcc-director-details
            [facilityPaper]="facilityPaper"
            [companyDirectorGroup]="companyDirectorGroup"
            (addCompanyManagerFormRow)="addCompanyManagerRow()"
            (removeCompanyManagerFormRow)="removeCompanyManagerRow($event)"
          >
          </app-bcc-director-details>
        </div>
      </div>

      <div class="d-flex flex-row">
        <p class="w-15">Stated Capital</p>
        <p>:</p>
        <div class="w-85 data-lbl">
          <input mdbValidate
                 type="text"
                 id="startedCapital"
                 formControlName="startedCapital"
                 class="custom-text-input"
                 placeholder="Stated Capital"
                 mdbInput>
        </div>
      </div>

      <div class="d-flex flex-row">
        <p class="w-15">Strengths</p>
        <p>:</p>
        <div class="w-85 data-lbl">
          <app-bcc-strengths [strengths]="strengths">
          </app-bcc-strengths>
        </div>
      </div>

      <app-bcc-crib-details [cribDetailsGroup]="cribDetailsGroup"
                            (addCribDetailFromRow)="addCribDetailRow()"
                            (removeCribDetailRow)="removeCribDetailRow($event)">
        >
      </app-bcc-crib-details>

      <div class="d-flex flex-row mt-5p">
        <p class="w-15">Market Position</p>
        <p>:</p>
        <div class="w-85 data-lbl">
          <textarea
            mdbValidate
            type="text"
            id="marketPosition"
            formControlName="marketPosition"
            class="form-control comment-area"
            maxlength="4000"
            placeholder="..."
            style="height: 100%"
            mdbInput>
          </textarea>
        </div>
      </div>

      <div class="d-flex flex-row mt-5p">
        <p class="w-15">Business/Management Strengths</p>
        <p>:</p>
        <div class="w-85 data-lbl">
           <textarea type="text"
                     id="businessManagementStrength"
                     class="form-control comment-area"
                     maxlength="4000"
                     placeholder="..."
                     formControlName="businessManagementStrength"
                     style="height: 100%"
                     mdbInput>
          </textarea>
        </div>
      </div>

      <div class="d-flex flex-row mt-5p">
        <p class="w-15">Security Cover and Past Performance with us/other banks </p>
        <p>:</p>
        <div class="w-85 data-lbl">
        <textarea type="text"
                  id="securityCover"
                  class="form-control comment-area"
                  maxlength="4000"
                  placeholder="..."
                  formControlName="securityCover"
                  style="height: 100%"
                  mdbInput>
          </textarea>
        </div>
      </div>
    </div>
  </div>
</form>
