<form [formGroup]="strengths">
  <div class="d-flex flex-column">
    <div class="d-flex flex-row justify-content-between">
      <!--      <div class="col-4 d-flex flex-row" style="padding-left: unset !important;">-->
      <!--        <p class="w-45">Financial Stability</p>-->
      <!--        <p>:</p>-->
      <!--        <div class="w-50" style="margin-left: 2%">-->
      <!--          &lt;!&ndash;          <mdb-select&ndash;&gt;-->
      <!--          &lt;!&ndash;            id="financialStability"&ndash;&gt;-->
      <!--          &lt;!&ndash;            [options]="financialStabilityOptionSelect"&ndash;&gt;-->

      <!--            <option *ngFor="let item of financialStabilityOptionSelect " [value]="item.value">{{item.label}}</option>-->
      <!--          </select>-->
      <!--        </div>-->
      <!--      </div>-->
      <p class="w-20">Name of Auditor</p>
      <p>:</p>
      <div class="w-80">
        <input mdbValidate
               type="text"
               id="auditorName"
               class="custom-text-input"
               formControlName="auditorName"
               placeholder="Name"
               mdbInput
        >
      </div>
    </div>
    <table class="table custom-bordered-table">
      <tbody>
      <tr>
        <th></th>
        <th colspan="2" class="text-align-center">
          <div class="d-flex flex-row">
            <select id="financialYearOne" formControlName="financialYearOne" class="custom-select-input">
              <option *ngFor="let item of financialYearsOptionSelect" [value]="item.value">{{item.label}}</option>
            </select>

            <select id="financialYearOneFinancial" formControlName="financialYearOneFinancial"
                    class="custom-select-input">
              <option *ngFor="let item of financialStabilityOptionSelect" [value]="item.value">{{item.label}}</option>
            </select>
          </div>
        </th>
        <th colspan="2" class="text-align-center">
          <div class="d-flex flex-row">
            <select id="financialYearTwo" formControlName="financialYearTwo" class="custom-select-input">
              <option *ngFor="let item of financialYearsOptionSelect" [value]="item.value">{{item.label}}</option>
            </select>

            <select id="financialYearTwoFinancial" formControlName="financialYearTwoFinancial"
                    class="custom-select-input">
              <option *ngFor="let item of financialStabilityOptionSelect" [value]="item.value">{{item.label}}</option>
            </select>
          </div>
        </th>
      </tr>
      <tr>
        <td></td>
        <td>Amount (Rs.Mn)</td>
        <td>Growth (%)</td>
        <td>Amount (Rs.Mn)</td>
        <td>Growth (%)</td>
      </tr>

      <tr>
        <td>Income</td>
        <td>
          <input mdbValidate
                 type="text"
                 id="incomeAmountYearOne"
                 formControlName="incomeAmountYearOne"
                 class="custom-text-input text-align-end"
                 placeholder="0.0"
                 (keydown)="validateNumber($event)"
                 (focusout)="currencyService.patchFormControllerValue(strengths, 'incomeAmountYearOne')"
                 [class.custom-text-input-error]="strengths.get('incomeAmountYearOne') && strengths.get('incomeAmountYearOne').dirty && !strengths.get('incomeAmountYearOne').valid ?  strengths.get('incomeAmountYearOne').errors.isCommaSeparatedValueError : false "
                 mdbInput>
        </td>
        <td>
          <input mdbValidate
                 type="text"
                 id="incomeGrowthYearOne"
                 formControlName="incomeGrowthYearOne"
                 class="custom-text-input text-align-end"
                 placeholder="0.0%"
                 (keydown)="validateNumber($event)"
                 (focusout)="currencyService.patchFormControllerValue(strengths, 'incomeGrowthYearOne')"
                 [class.custom-text-input-error]="strengths.get('incomeGrowthYearOne') && strengths.get('incomeGrowthYearOne').dirty && !strengths.get('incomeGrowthYearOne').valid ?  strengths.get('incomeGrowthYearOne').errors.percentageValueError : false "
                 mdbInput>
        </td>
        <td>
          <input mdbValidate
                 type="text"
                 id="incomeAmountYearTwo"
                 formControlName="incomeAmountYearTwo"
                 class="custom-text-input text-align-end"
                 placeholder="0.0"
                 (keydown)="validateNumber($event)"
                 (focusout)="currencyService.patchFormControllerValue(strengths, 'incomeAmountYearTwo')"
                 [class.custom-text-input-error]="strengths.get('incomeAmountYearTwo') && strengths.get('incomeAmountYearTwo').dirty && !strengths.get('incomeAmountYearTwo').valid ?  strengths.get('incomeAmountYearTwo').errors.isCommaSeparatedValueError : false "
                 mdbInput>

        </td>
        <td>
          <input mdbValidate
                 type="text"
                 id="incomeGrowthYearTwo"
                 formControlName="incomeGrowthYearTwo"
                 class="custom-text-input text-align-end"
                 placeholder="0.0%"
                 (keydown)="validateNumber($event)"
                 (focusout)="currencyService.patchFormControllerValue(strengths, 'incomeGrowthYearTwo')"
                 [class.custom-text-input-error]="strengths.get('incomeGrowthYearTwo') && strengths.get('incomeGrowthYearTwo').dirty && !strengths.get('incomeGrowthYearTwo').valid ?  strengths.get('incomeGrowthYearTwo').errors.percentageValueError : false "
                 mdbInput>
        </td>
      </tr>

      <tr>
        <td>Profit After Tax</td>
        <td>
          <input mdbValidate
                 type="text"
                 id="profitAfterTaxAmountYearOne"
                 formControlName="profitAfterTaxAmountYearOne"
                 class="custom-text-input text-align-end"
                 placeholder="0.0"
                 (keydown)="validateNumber($event)"
                 (focusout)="currencyService.patchFormControllerValue(strengths, 'profitAfterTaxAmountYearOne')"
                 [class.custom-text-input-error]="strengths.get('profitAfterTaxAmountYearOne') && strengths.get('profitAfterTaxAmountYearOne').dirty && !strengths.get('profitAfterTaxAmountYearOne').valid ?  strengths.get('profitAfterTaxAmountYearOne').errors.isCommaSeparatedValueError : false "
                 mdbInput>

        </td>
        <td>
          <input mdbValidate
                 type="text"
                 id="profitAfterTaxGrowthYearOne"
                 formControlName="profitAfterTaxGrowthYearOne"
                 class="custom-text-input text-align-end"
                 placeholder="0.0%"
                 (keydown)="validateNumber($event)"
                 (focusout)="currencyService.patchFormControllerValue(strengths, 'profitAfterTaxGrowthYearOne')"
                 [class.custom-text-input-error]="strengths.get('profitAfterTaxGrowthYearOne') && strengths.get('profitAfterTaxGrowthYearOne').dirty && !strengths.get('profitAfterTaxGrowthYearOne').valid ?  strengths.get('profitAfterTaxGrowthYearOne').errors.percentageValueError : false "
                 mdbInput>

        </td>
        <td>
          <input mdbValidate
                 type="text"
                 id="profitAfterTaxAmountYearTwo"
                 formControlName="profitAfterTaxAmountYearTwo"
                 class="custom-text-input text-align-end"
                 placeholder="0.0"
                 (keydown)="validateNumber($event)"
                 (focusout)="currencyService.patchFormControllerValue(strengths, 'profitAfterTaxAmountYearTwo')"
                 [class.custom-text-input-error]="strengths.get('profitAfterTaxAmountYearTwo') && strengths.get('profitAfterTaxAmountYearTwo').dirty && !strengths.get('profitAfterTaxAmountYearTwo').valid ?  strengths.get('profitAfterTaxAmountYearTwo').errors.isCommaSeparatedValueError : false "
                 mdbInput>

        </td>
        <td>
          <input mdbValidate
                 type="text"
                 id="profitAfterTaxGrowthYearTwo"
                 formControlName="profitAfterTaxGrowthYearTwo"
                 class="custom-text-input text-align-end"
                 placeholder="0.0%"
                 (keydown)="validateNumber($event)"
                 (focusout)="currencyService.patchFormControllerValue(strengths, 'profitAfterTaxGrowthYearTwo')"
                 [class.custom-text-input-error]="strengths.get('profitAfterTaxGrowthYearTwo') && strengths.get('profitAfterTaxGrowthYearTwo').dirty && !strengths.get('profitAfterTaxGrowthYearTwo').valid ?  strengths.get('profitAfterTaxGrowthYearTwo').errors.percentageValueError : false "
                 mdbInput>
        </td>
      </tr>
      </tbody>
    </table>
  </div>

  <div class="d-flex flex-column item-box">
    <div class="d-flex flex-row width-100">
      <table class="width-100">
        <tr>
          <td class="width-15">Interest Cover</td>
          <td>:</td>
          <td class="width-35">
            <input mdbValidate
                   type="text"
                   id="interestCover"
                   formControlName="interestCover"
                   class="custom-text-input"
                   placeholder="Interest Cover"
                   mdbInput>
          </td>
          <td class="width-15">Net Interest Margin</td>
          <td>:</td>
          <td class="width-35">
            <input mdbValidate
                   type="text"
                   id="netInterestMargin"
                   formControlName="netInterestMargin"
                   class="custom-text-input"
                   placeholder="Net Interest Margin"
                   mdbInput>
          </td>
        </tr>
        <tr>
          <td class="width-15">Gearing</td>
          <td>:</td>
          <td class="width-35">
            <input mdbValidate
                   type="text"
                   id="gearing"
                   formControlName="gearing"
                   class="custom-text-input"
                   placeholder="gearing"
                   mdbInput>
          </td>
          <td class="width-15">Gross NPL</td>
          <td>:</td>
          <td class="width-35">
            <input mdbValidate
                   type="text"
                   id="grossNPL"
                   formControlName="grossNPL"
                   class="custom-text-input"
                   placeholder="Gross NPL"
                   mdbInput>
          </td>
        </tr>
      </table>
    </div>
  </div>
</form>
