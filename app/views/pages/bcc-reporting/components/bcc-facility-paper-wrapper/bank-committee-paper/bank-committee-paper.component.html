<div class="d-flex flex-column bcc-body">
  <div>
    <div class="float-right">
      <div class="d-flex flex-row align-items-center">
        <button mdbBtn
                type="button"
                class="action-button-padding btn-info btn-sm"
                outline="true"
                style=" position: fixed; margin-left: -74px"
                mdbWavesEffect
                [disabled]="!this.bccForm.valid"
                (click)="saveBCCPaper()">
          <span>Save</span>
        </button>
      </div>
    </div>
  </div>
  <div class="text-align-center">
    <ng-container *ngIf="bccPaper.paperType == bccPaperTypeConst.BCC || bccPaper.paperType == bccPaperTypeConst.EEBCC">
    <h5 style="font-weight: inherit">
      REPORTING OF FACILITY/ IES APPROVED BY EXECUTIVE ADVANCES COMMITTEE / MANAGING DIRECTOR
    </h5>
    </ng-container>

    <ng-container *ngIf="bccPaper.paperType == bccPaperTypeConst.BCCC">
      <h5 style="font-weight: inherit">
        COVERING APPROVAL FOR FACILITY/ IES APPROVED BY EXECUTIVE ADVANCES COMMITTEE / MANAGING DIRECTOR
      </h5>
    </ng-container>

    <ng-container *ngIf="bccPaper.paperType == bccPaperTypeConst.EEBCC">
      <p style="font-weight: inherit">
        (EXPOSURE ENHANCEMENT TO CREDIT FACILITIES PREVIOUSLY APPROVED BY BOARD CREDIT COMMITTEE)
      </p>
    </ng-container>

  </div>

  <div>
    <app-bcc-basic-info
      [strengths]="bccForm.get('strengths')"
      [basicInfo]="bccForm.get('basicInfo')"
      [cribDetailsGroup]="bccForm.get('cribDetailsGroup')"
      [companyDirectorGroup]="bccForm.get('companyDirectorGroup')"
      [riskRatingYearGroup]="bccForm.get('riskRatingYearGroup')"
      (addCompanyManagerFromRow)="addCompanyManagerFromRow()"
      (removeCompanyManagerFormRow)="removeCompanyManagerFormRow($event)"
      (addRiskRatingYearFromRow)="addRiskRatingYearFormRow()"
      (removeRiskRatingYearFormRow)="removeRiskRatingYearFromRow($event)"
      (addCribDetailFromRow)="addCribDetailFromRow()"
      (removeCribDetailFromRow)="removeCribDetailFromRow($event)"
    >
    </app-bcc-basic-info>
  </div>

  <div class="d-flex flex-row justify-content-between w-100-p mt-2">
    <div class="w-49">
      <app-bcc-cost-of-funds [costOfFunds]="bccForm.get('costOfFunds')">
      </app-bcc-cost-of-funds>
    </div>
    <div class="w-49">
      <app-bcc-recommended-options [recommendedOptions]="bccForm.get('recommendedOptions')">
      </app-bcc-recommended-options>
    </div>
  </div>

  <div>
    <app-bcc-justification [justificationGroup]="bccForm.get('justificationGroup')">
    </app-bcc-justification>
  </div>

  <div>
    <app-bcc-proposed-facilities [proposedFacilitiesGroup]="bccForm.get('proposedFacilitiesGroup')"
                                 (addFacilityFormRow)="addProposedFacilityFromRow()"
                                 (removeFacilityFormRow)="addRemoveProposedFacilityFromRow($event)">
    </app-bcc-proposed-facilities>
  </div>

  <div>
    <app-bcc-existing-facilities [existingFacilitiesGroup]="bccForm.get('existingFacilitiesGroup')"
                                 (addFacilityFormRow)="addExistingFacilityFromRow()"
                                 (removeFacilityFormRow)="addRemoveExistingFacilityFromRow($event)">
    </app-bcc-existing-facilities>
  </div>

  <div>
    <app-bcc-facility-common-security [commonSecurityText]="bccForm.get('commonSecurityTextGroup')">
    </app-bcc-facility-common-security>
  </div>


  <div>
    <app-bcc-exposure-table [exposureGroup]="bccForm.get('exposureGroup')">
    </app-bcc-exposure-table>
  </div>

  <div>
    <app-bcc-officer-approval [officerApprovalGroup]="bccForm.get('officerApprovalGroup')">
    </app-bcc-officer-approval>
  </div>

</div>
