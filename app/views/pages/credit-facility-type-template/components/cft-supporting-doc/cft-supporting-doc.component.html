<div class="modal-header">
  <div class="modal-header text-center no-border">
    <h4 class="modal-title w-100 font-weight-bold">Add CFT Supporting Documents</h4>
    <button type="button" class="close" data-dismiss="modal" aria-label="Close" (click)="mdbModalRef.hide()">
      <span aria-hidden="true">&times;</span>
    </button>
  </div>
</div>

<div class="modal-body mx-3">
  <form class="d-flex p-2 flex-column justify-content-start align-items-start w-100-p" [formGroup]="componentForm">

    <div class="md-form m-top-10px m-bottom-10px w-100-p">
      <input mdbValidate type="text"
             id="documentName"
             maxlength="200"
             formControlName="documentName"
             class="form-control"
             placeholder="Choose Supporting Doc"
             [mdbAutoCompleter]="auto"
             mdbInput>

      <mdb-auto-completer #auto="mdbAutoCompleter" textNoResults="I have found no results :(">
        <mdb-option *ngFor="let option of result|async" [value]="option.documentName">
          {{ option.documentName }}
        </mdb-option>
      </mdb-auto-completer>
      <label for="documentName">Supporting Document</label>
      <mdb-error *ngIf="formErrors.documentName.required">Supporting Document required</mdb-error>
    </div>

    <div class="md-form m-top-10px m-bottom-10px w-100-p">
      <mdb-select
        [options]="yesNo"
        formControlName="mandatory"
        id="mandatory"
        placeholder="Mandatory"></mdb-select>
      <label for="status">Mandatory</label>
      <mdb-error *ngIf="formErrors.mandatory.required">Mandatory required</mdb-error>
    </div>

    <div class="md-form m-top-10px m-bottom-10px w-100-p">
      <mdb-select
        [options]="optionsSelect"
        formControlName="status"
        id="status"
        placeholder="Status"></mdb-select>
      <label for="status">Status</label>
      <mdb-error *ngIf="formErrors.status.required">Status required</mdb-error>
    </div>
  </form>
</div>

<div class="modal-footer">
  <button type="button" mdbBtn color="primary" class="relative waves-light" mdbWavesEffect
          [disabled]="componentForm.invalid" (click)="onAdd()">ADD
  </button>
</div>
