<div mdbSticky class="d-flex flex-row justify-content-between page-header">
  <div class="d-flex flex-row align-items-center">
    <h5><i class="fas fa-vector-square header-icon"></i> UPM Group(s)</h5>
  </div>

  <div class="d-flex flex-row align-items-center">
    <ng-container *appHasAnyPrivilege="masterDataPrivilege.ICAS_SETTINGS_UPM_GROUP_ADD">
      <button (click)="loadSelectedItem(null)"
              class="custom-button"
              mdbBtn
              type="button"
              color="default"
              outline="true"
              mdbWavesEffect>New UPM Group
      </button>
    </ng-container>
  </div>
</div>

<div class="page-search-section section display-flex flex-column jc-start p-2 pt-3 pb-3 default-box-styles">
  <form class="display-flex w-100-p flex-row jc-space-around ai-center" [formGroup]="searchForm">

    <div class="md-form w-24-p min-width-120">
      <input type="text" id="groupCode" formControlName="groupCode" class="form-control" mdbInput>
      <label for="groupCode">Group Code</label>
    </div>
    <div class="md-form w-24-p min-width-120">
      <input type="text" id="referenceName" formControlName="referenceName" class="form-control" mdbInput>
      <label for="referenceName">Reference Name</label>
    </div>

    <div class="md-form w-24-p min-width-120">
      <mdb-select
        [options]="optionsSelect"
        formControlName="status"
        id="status"
        placeholder="Status"></mdb-select>
      <label for="status">Status</label>
    </div>

    <div class="md-form w-24-p min-width-120">
      <mdb-select
        [multiple]="true"
        [options]="approveStatusOptionsSelect"
        formControlName="approveStatusList"
        id="approveStatusList"
        placeholder="All"></mdb-select>
      <label for="approveStatusList">Approval Status</label>
    </div>

    <div class="display-flex flex-1 flex-row jc-end ai-center">
      <button (click)="doSearch()" type="button" class=" medium-button btn btn-info" mdbBtn>Search</button>
      <button (click)="clearSearch()" class=" medium-button btn btn-outline-info clear-btn" mdbBtn type="button">
        Clear
      </button>
    </div>
  </form>
</div>

<div *ngIf="pageDataDTOs.length == 0" class="alert alert-warning section" role="alert">
  No UPM Group(s) Found !
</div>

<ng-container *ngIf="pageDataDTOs.length > 0">
  <div class="section table-responsive mb-15p ">
    <table class="table">
      <thead>
      <tr>
        <ng-container *ngFor="let col of tableColumns">
          <th scope="col">{{col}}</th>
        </ng-container>
      </tr>
      </thead>
      <tbody>
      <ng-container *ngFor="let dataDTO of pageDataDTOs">
        <tr (click)="loadSelectedItem(dataDTO.upmGroupID)" class="table-clickable-row">
          <td>{{dataDTO.groupCode}}</td>
          <td>{{dataDTO.referenceName}}</td>
          <td>
            <span
              [class.color-green]="dataDTO.status === statusConst.ACT"
              [class.color-red]="dataDTO.status === statusConst.INA"
            >
                  {{status[dataDTO.status]}}
                </span>
          </td>
          <td>
            <span
              [class.color-green]="dataDTO.approveStatus === approvedStatusConst.APPROVED"
              [class.color-red]="dataDTO.approveStatus === approvedStatusConst.REJECTED"
              [class.color-blue]="dataDTO.approveStatus == approvedStatusConst.PENDING"
            >
                  {{approvedStatus[dataDTO.approveStatus]}}
                </span>
          </td>
          <td>{{dataDTO.approvedDateStr ? dataDTO.approvedDateStr : '-'}}</td>
          <td>{{dataDTO.approvedBy ? dataDTO.approvedBy : '-'}}</td>
        </tr>
      </ng-container>
      </tbody>
    </table>
  </div>
    <app-paginator
      [pageIndex]="pageSize.pageIndex"
      [length]="pageSize.length"
      [pageSize]="pageSize.pageSize"
      [pageSizeOptions]="pageSize.pageSizeOptions"
      (page)="onPageEvent($event)"
    ></app-paginator>
  
</ng-container>
