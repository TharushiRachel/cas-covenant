<div class="m-0 p-0" *ngIf="tabLoadingSetting.isCmntLoaded">
  <table class="table table-bordered mt-2">
    <thead class="table-light">
      <tr>
        <th style="min-width: 80px;">User ID</th>
        <th style="min-width: 175px;">Date</th>
        <th>Comment</th>
        <th style="min-width: 120px;">Comment Type</th>
      </tr>
    </thead>
    <tbody>
      <ng-container *ngIf="commentsDetails.length > 0">
        <tr *ngFor="let comment of commentsDetails">
          <td>{{ comment.userID }}</td>
          <td>{{ comment.remarkDate | date:'medium' }}</td>
          <td>{{ comment.remark1 }}</td>
          <td>{{ comment.codeDesc }}</td>
        </tr>
      </ng-container>
      <ng-container *ngIf="commentsDetails.length == 0">
        <tr>
          <td colspan="4" class="text-center">No Records Found.</td>
        </tr>
      </ng-container>
    </tbody>
  </table>
</div>
