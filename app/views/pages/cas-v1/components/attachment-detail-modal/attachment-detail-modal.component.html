<div class="modal-header">
    <div class="header-text">
        <h5 class="modal-title">{{ heading }}</h5>
    </div>   
    <button type="button" class="close" aria-label="Close" (click)="modalRef.hide()">
        <span aria-hidden="true">&times;</span>
    </button>
  </div>
  
  <div class="modal-body">
    <div *ngIf="lastModifiedDate !== 'No Record'">
      <p><strong>Last Modified:</strong> {{ lastModifiedDate }}</p>
    </div>
  
    <div *ngIf="fileContent">
      <p><strong>File Content:</strong>{{ fileContent }}</p>
    </div>
  
    <div *ngIf="!fileContent && lastModifiedDate === 'No Record'">
      <p class="text-muted">No additional details available.</p>
    </div>
  </div>
  
  <div class="modal-footer">
    <button type="button" class="btn btn-secondary" (click)="modalRef.hide()">Close</button>
  </div>
