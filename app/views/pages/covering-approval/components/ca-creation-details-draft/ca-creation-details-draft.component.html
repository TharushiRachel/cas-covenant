<div class="ca-creation-container-fluid">
  <div class="ca-creation-container-caption">
    <div class="modal-header ca-header">
      <h4 class="modal-title">Covering Approval Creation Details</h4>
      <button type="button" class="close" aria-label="Close" (click)="mdbModalRef.hide()">
        <span aria-hidden="true">&times;</span>
      </button>
    </div>
    <p *ngIf="!transformedDetails || transformedDetails.length === 0">
      No details found for the provided transaction ID and date.
    </p>
  </div>
  <div class="modal-body" style="max-height: calc(100vh - 150px); overflow-y: auto;">
    <div class="d-flex justify-content-center">
      <div class="width-90 m-top-20px">
        <form [formGroup]="detailsForm">
          <div *ngFor="let detail of transformedDetails" class="card border-info mb-3">
            <div class="card-body">
              <div class="d-flex flex-wrap">
                <div class="d-flex flex-row justify-content-between width-50">
                  <label for="customerName" class="form-label info-caption">Customer Name</label>
                  <span class="width-5">:</span>
                  <input type="text" id="customerName" formControlName="customerName" class="info-details form-control"
                    [value]="detail.accName" readonly>
                </div>
                <div class="d-flex flex-row justify-content-between width-50">
                  <label for="tranDate" class="form-label info-caption">Date</label>
                  <span class="width-5">:</span>
                  <input type="text" id="tranDate" formControlName="tranDate" class="info-details form-control"
                    [value]="transactionDetails.tranDate | date:'dd/MM/yyyy'" readonly>
                </div>
                <div class="d-flex flex-row justify-content-between width-50">
                  <label for="accNumber" class="form-label info-caption">Account Number</label>
                  <span class="width-5">:</span>
                  <input type="text" id="accNumber" formControlName="accNumber" class="info-details form-control"
                    [value]="detail.accNumber" readonly>
                </div>
                <div class="d-flex flex-row justify-content-between width-50">
                  <label for="tranAmount" class="form-label info-caption">Transaction Amount</label>
                  <span class="width-5">:</span>
                  
                  <input type="text" id="tranAmount" formControlName="tranAmount" class="info-details form-control"
                  [value]="detail.trnCrncy + ' ' + getFormattedValue(detail.tran_amt)" readonly>
                   
                </div>
                <div class="d-flex flex-row justify-content-between width-50">
                  <label for="chequeNumber" class="form-label info-caption">Cheque Number</label>
                  <span class="width-5">:</span>
                  <input type="text" id="chequeNumber" formControlName="chequeNumber" class="info-details form-control"
                    [value]="detail.instNum" readonly>
                </div>
                <div *ngIf="detail.showDraftButton" class="d-flex flex-row width-50">
                  <div class="justify-content-end">
                    <button type="button" (click)="onNoClick()" mdbBtn color="light" class="btn-sm waves-light mr-2"
                      mdbWavesEffect>Cancel</button>
                    <button type="button" (click)="navigateToCaCreation(detail)" mdbBtn color="info"
                      class="btn-sm waves-light" mdbWavesEffect>Next</button>
                  </div>
                </div>
                <div *ngIf="!detail.showDraftButton" class="d-flex flex-row justify-content-between width-100">
                  <span id="cov-span" class="width-100">Covering Approval drafted by {{detail.createdBy}} on
                    {{detail.createdDate | date:'dd/MM/yyyy'}}</span>
                </div>
                
                <div *ngIf="false" class="d-flex flex-row justify-content-between width-50 comment-div">
                  <label for="comment" class="form-label info-caption">Comments</label>
                  <span class="width-5">:</span>
                  <textarea id="comment" class="form-control info-details rounded-0 comment-area"
                    formControlName="comment" appTextAreaAutoHeight style="width: 50%;border: revert;"
                    mdbInput></textarea>
                </div>
              </div>
            </div>

          </div>
        </form>
      </div>
    </div>
  </div>
</div>
