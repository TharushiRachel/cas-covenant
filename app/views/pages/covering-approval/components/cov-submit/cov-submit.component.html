<div class="modal-header modal-topic flex-center">
    <h4 class="modal-title w-100 font-weight-bold">Submit Covering Approval</h4>
    <button type="button" class="close" data-dismiss="modal" aria-label="Close" (click)="mdbModalRef.hide()">
      <span aria-hidden="true">&times;</span>
    </button>
  </div>
  
  <div [formGroup]="componentForm" class="d-flex flex-row w-100-p comment-container">
    <div class="m-top-10px m-bottom-10px w-100-p">
      <label for="comment" style="color: black"></label>
      <textarea
        type="text"
        class="form-control rounded-0 comment-area"
        id="comment"
        placeholder="Comment here..."
        formControlName="comment"
        maxlength="4000"
        rows="5"
        mdbInput>
      </textarea>
    </div>
  </div>
  
  <div class="modal-footer modal-end">
    <button type="button" mdbBtn color="light" class="btn-sm relative waves-light" mdbWavesEffect
        (click)="mdbModalRef.hide()">Close
    </button>
  
    <button type="button" mdbBtn color="info" class="btn-sm relative waves-light" mdbWavesEffect
        (click)="onSubmit()">Submit
    </button>
  </div>
