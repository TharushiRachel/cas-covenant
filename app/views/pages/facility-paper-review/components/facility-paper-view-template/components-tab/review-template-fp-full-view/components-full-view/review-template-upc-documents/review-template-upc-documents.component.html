<div class="d-flex mt-10p flex-column width-100">
  <ng-container *ngIf="facilityPaper.upcTemplateName">
    <div class="text-align-center topic">
      <h5>{{facilityPaper.upcTemplateName}}</h5>
    </div>
  </ng-container>

  <div class="d-flex flex-row justify-content-between align-items-center w-100-p default-upc-section-structure"
       style="margin-top: -5px">
    <div class="w-100-p">
      <ng-container class="w-100-p">
        <app-review-template-upc-template-structure
          [allUpcSectionData]="allUpcSectionData"
          [alreadyAddedUpcSectionIDs]="alreadyAddedUpcSectionIDs"
          [initNodeRowData]="initNodeRowData"
          [initNodeData]="initNodeData"
          [upcTemplateName]="upcTemplateName"
          [hasFptemplates]="hasFptemplates"
          [facilityPaper]="facilityPaper"
        >
        </app-review-template-upc-template-structure>
      </ng-container>
    </div>
  </div>
</div>
