<div class="modal-header modal-topic">
  <h4 class="modal-title w-100 font-weight-bold">Select Facility</h4>
  <button type="button" class="close" data-dismiss="modal" aria-label="Close" (click)="mdbModalRef.hide()">
    <span aria-hidden="true">&times;</span>
  </button>
</div>
<div class="modal-body">
  <table class="table table-bordered table-hover">
    <thead>
      <tr>
        <th>#</th>
        <th>Facility Name</th>
        <th>Currency</th>
        <th>Amount (Mn)</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let facility of facilities; let i = index">
        <td>{{ i + 1 }}</td>
        <td>{{ facility.creditFacilityName }}</td>
        <td>{{ facility.facilityCurrency }}</td>
        <td>{{ facility.facilityAmountMillion }}</td>
        <td>
          <button class="btn btn-sm btn-success" (click)="selectFacility(facility)">Select</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
