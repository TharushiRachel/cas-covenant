<div class="d-flex flex-column justify-content-start w-100-p">
  <div class="w-100-p">
    <div class="d-flex flex-row jc-space-between">

         <ng-container *ngIf="!watchlistStatus" style="color: rgb(228, 18, 18);">Watchlist Customer </ng-container></label>
       -->
       <label style="margin-top: 11px;">
        <span class="font-weight-bold">Borrower Details</span>

          <button (click)="openModalAddCustomer(facilityPaper)"

                  class=" medium-button btn-sm btn-info relative-icon "
                  mdbBtn>
            Joining Partner(s)
          </button>
        </ng-container>
      </ng-container>
    </div>

    <app-fp-personal-detail-tab-view
      [mainFacilityPaper]="mainFacilityPaper"
      (onKaliptoDataLoad)="onKaliptoDataLoad($event)"
    >
    </app-fp-personal-detail-tab-view>
  </div>
</div>
