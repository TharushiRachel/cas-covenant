<div class="modal-header modal-topic flex-center">
  <h4 class="modal-title w-100 font-weight-bold">
    {{content.approvalModalTopic}}
  </h4>
  <button type="button" class="close" data-dismiss="modal" aria-label="Close" (click)="mdbModalRef.hide()">
    <span aria-hidden="true">&times;</span>
  </button>
</div>

<div class="modal-body modal-detail form-margin">
  <form class="d-flex p-2 flex-column justify-content-start align-items-start w-100-p" [formGroup]="componentForm">
    <div class="d-flex flex-row w-100-p m-bottom-10px justify-content-between">
      <div class="md-form m-bottom-10px w-48-p">
      </div>
      <div class="md-form m-bottom-10px w-48-p text-align-end">
        <ng-container *ngIf="showDirectAdvanceOptions">
          <input type="radio" class="form-check-input"
                 id="direct" [value]="facilityReturnType.DIRECT"
                 formControlName="type"
                 name="type">
          <label class="form-check-label" for="direct">General</label>

          <input type="radio" class="form-check-input"
                 formControlName="type"
                 id="advance" [value]="facilityReturnType.ADVANCE"
                 name="type">
          <label class="form-check-label ml-20p" for="advance">Advance</label>
        </ng-container>
      </div>
    </div>
    <div class="d-flex m-top-10px flex-row w-100-p justify-content-between">
      <ng-container *ngIf="isDirect ; else advance">
        <div class="md-form m-top-10px m-bottom-10px w-48-p">
        </div>
        <div class="md-form m-top-10px m-bottom-10px w-48-p">
          <mdb-select
            [hidden]="(content.facilityPaperStatus === facilityStatus.REJECTED ||content.facilityPaperStatus === facilityStatus.APPROVED)"
            [options]="directUserOptions"
            formControlName="directReturnUser"
            id="directReturnUser"
            label="User"></mdb-select>
        </div>
      </ng-container>

      <ng-template #advance>
        <div class="md-form m-top-10px m-bottom-10px w-48-p">
          <mdb-select
            [hidden]="(content.facilityPaperStatus === facilityStatus.REJECTED ||content.facilityPaperStatus === facilityStatus.APPROVED)"
            [options]="groupOptions"
            formControlName="group"
            id="group"
            label="Group"></mdb-select>
          <mdb-error *ngIf="formError.group.required">Required</mdb-error>
        </div>
        <div class="md-form m-top-10px m-bottom-10px w-48-p">
          <mdb-select
            [hidden]="(content.facilityPaperStatus === facilityStatus.REJECTED ||content.facilityPaperStatus === facilityStatus.APPROVED)"
            [options]="userOption"
            formControlName="user"
            id="user"
            label="User"></mdb-select>
          <mdb-error *ngIf="userOption.length<=0 && groupValChange ">No users for selected group</mdb-error>
          <mdb-error *ngIf="formError.user.required">Required</mdb-error>
        </div>
      </ng-template>
    </div>


    <div class="d-flex flex-row w-100-p">
      <div class="md-form m-top-10px m-bottom-10px w-100-p ">
        <label for="comment" style="color: black"></label>
        <textarea type="text"
                  class="form-control rounded-0 comment-area"
                  id="comment"
                  placeholder="Comment here..."
                  formControlName="comment"
                  maxlength="4000"
                  rows="5" mdbInput>
        </textarea>
        <!--        <mdb-error *ngIf="formError.comment.maxLength">Max length is 4000</mdb-error>-->
      </div>
    </div>
  </form>
</div>
<div class="modal-footer modal-end">
  <button
    type="button" mdbBtn color="light" class="btn-sm relative waves-light" mdbWavesEffect
    (click)="mdbModalRef.hide()">Cancel
  </button>
  <button
    type="button" mdbBtn color="info" class="btn-sm relative waves-light" mdbWavesEffect
    [disabled]="!isValid()" (click)="submitForApprove()">Submit
  </button>

</div>
