<div class="row d-flex w-100-p mx-0 my-3" *ngIf="isMDReviewCmnViewEnabled()">

  <div class="col-md-12 row d-flex flex-row mx-0 w-100-p align-items-center p-0">
    <h6 style="font-weight: 600;">MD'S Review Comment(s)</h6>
    <ng-container *ngIf="isMDReviewCmntAddEnabled()">
      <button mdbBtn type="button" mdbTooltip="Add comment"
        class="action-button-padding btn-outline-info btn-sm ml-auto" outline="true" mdbWavesEffect
        (click)="saveOrUpdateMDComment()">
        <span>Add Comment</span>
      </button>
    </ng-container>
  </div>

  <div class="col-md-12 p-0">
    <app-fp-md-assistance-cmnt-view></app-fp-md-assistance-cmnt-view>
  </div>
</div>

<div class="d-flex flex-column justify-content-start align-items-start w-100-p">
  <div class="d-flex flex-row mb-3 w-100-p flex-wrap">
    <label class="mr-auto p-2"></label>

    <div class="float-right">
      <div class="d-flex flex-row align-items-center">
        <ng-container *ngIf="isAbleToAddEditComment() && !hasPrivilegeToViewBCCPapers && !isLegalOfficer">
          <button mdbBtn type="button" mdbTooltip="Add comment" class="action-button-padding btn-outline-info btn-sm"
            outline="true" mdbWavesEffect (click)="saveOrUpdateComment($event)">
            <span>Add Comment</span>
          </button>
        </ng-container>
      </div>
    </div>

    <div class="w-100-p">
      <app-common-user-comment [comments]="comments"
        [modifiedDateStr]="facilityPaper.modifiedDateStr ? facilityPaper.modifiedDateStr : facilityPaper.createdDateStr"
        [branchList]="allBanksDetails" [isAbleToAddEdit]="isAbleToAddEditComment()"
        (updateComment)="saveOrUpdateComment($event)">
      </app-common-user-comment>
    </div>
  </div>
</div>

<app-scroll-to-top></app-scroll-to-top>
