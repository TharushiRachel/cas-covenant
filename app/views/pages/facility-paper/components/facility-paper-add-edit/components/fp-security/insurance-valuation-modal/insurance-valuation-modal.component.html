
<div class="modal-header modal-topic">
    <h4 class="modal-title w-100 font-weight-bold">Insurance Valuations Details</h4>
    <button type="button" class="close" data-dismiss="modal" aria-label="Close" (click)="mdbModalRef.hide()">
        <span aria-hidden="true">&times;</span>
    </button>
</div>
<div class="modal-body mx-3 modal-detail form-margin">
<ng-container *ngFor="let customer of customerDTOList">
    <h6 class="modal-title w-100 font-weight-bold" style="margin-left: 10px ;">For Customer with Finacle Id {{customer.customerFinancialID || "unkown"}}</h6>
    
    <app-customer-insurance-valuation  [insuranceParams] = "getCustomerDetails(customer)">
    </app-customer-insurance-valuation>
    <br><br>

</ng-container>

</div>
