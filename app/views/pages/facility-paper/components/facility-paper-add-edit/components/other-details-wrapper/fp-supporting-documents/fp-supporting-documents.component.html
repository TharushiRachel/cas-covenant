<div class="d-flex flex-column justify-content-start align-items-start w-100-p ">

  <div class="d-flex flex-row w-100-p mb-3 flex-wrap justify-content-between">
    <div class="padding-4px">
      <label class="font-weight-bold mr-auto">Supporting Document(s)</label>
    </div>

    <div class="d-flex justify-content-end align-items-center">
      <div *ngIf="showDownloadDocsBtn()">
        <button 
          mdbBtn 
          type="button" 
          color="success" 
          (click)="downloadSupportingDocsZip()" 
          class="btn-width d-flex align-items-center" 
          size="sm" 
          data-toggle="tooltip" 
          data-placement="bottom" 
          [title]="'Download All Supporting Documents'" 
          mdbWavesEffect>
          <i class="fas fa-download text-dark" style="margin-right: 4px;"></i>
          <span class="text-dark">Download All</span>
          
        </button>
      </div>
    
      <ng-container *appHasAnyPrivilege="masterDataPrivilege.ICAS_SETTINGS_UPLOAD_SUPPORTING_DOCUMENTS">
        <ng-container *ngIf="isEqualLoginAndAssignUser() && !isApproveStatus() && !isRejected()">
          <button
            type="button"
            class="btn btn-light cta-btn px-sm-2"
            mdbTooltip="Add Supporting Doc" placement="left"
            (click)="openModalSupportDocumentUpload(facilityPaper)">
            <i class="fas fa-plus text-dark" aria-hidden="true"></i>
          </button>
        </ng-container>
      </ng-container>
    </div>
  </div>
  <div class="table-responsive">
    <table class="table">
      <thead>
      <tr>
        <th>Document Name</th>
        <th>Uploaded By</th>
        <th class="text-align-center">Date & Time</th>
        <th>Remark</th>
        <th class="text-align-center">Action</th>
      </tr>
      </thead>
      <tbody>
      <ng-container *ngFor="let item of fpDocumentDTOList">
        <tr class="">
          <td>{{item.documentName}}</td>
          <td>{{item.uploadedUserDisplayName}}</td>
          <td class="text-align-center">{{item.createdDateStr}}</td>
          <td>{{item.description}}</td>
          <td class="text-align-center width-15">
            <div>
              <ng-container *ngIf="isCheckedPdf(item)">
                <button class="btn btn-sm btn-success cta-btn" type="button" mdbWavesEffect

                      (click)="onDownloadDoc(item)"
                      mdbTooltip="View Supporting Doc" placement="left">
                  <mdb-icon fas icon="fas fa-eye" aria-hidden="true"></mdb-icon>
                </button>
              </ng-container>
              
              <button class="btn btn-sm btn-success cta-btn" type="button" mdbWavesEffect
                      (click)="downloadDocument(item)"
                      mdbTooltip="Download Supporting Doc" placement="left">
                <mdb-icon fas icon="fa fa-download" aria-hidden="true"></mdb-icon>
              </button>
              <ng-container *appHasAnyPrivilege="masterDataPrivilege.ICAS_SETTINGS_UPLOAD_SUPPORTING_DOCUMENTS">
                <ng-container *ngIf="isEqualLoginAndAssignUser() && !isApproveStatus() && !isRejected()">
                  <ng-container *ngIf="isUploadedDiv(item)">
                    <button class="btn btn-sm btn-danger cta-btn delete-button" type="button" mdbWavesEffect
                            (click)="remove(item)"
                            mdbTooltip="Delete Supporting Doc" placement="left">
                      <mdb-icon fas icon="trash-alt" aria-hidden="true"></mdb-icon>
                    </button>
                  </ng-container>
                </ng-container>
              </ng-container>
            </div>
          </td>
        </tr>
      </ng-container>
      </tbody>
    </table>
  </div>
</div>
<a class="download-link" #downloadLink></a>
