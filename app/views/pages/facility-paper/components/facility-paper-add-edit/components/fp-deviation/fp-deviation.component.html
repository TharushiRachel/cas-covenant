<div *ngIf="isLeaseFacilityInclude;else emptyView">
  <div class="text-align-center topic" *ngIf="!isDeviationTableEditable">
    <h5 class="font-weight-400"> Deviations</h5>
  </div>

  <div class="d-flex justify-content-end" *ngIf="isTableShow">
    <span class="d-flex justify-content-end" *ngIf="isShowRefreshButton">
      <button class="btn btn-info me-2" (click)="refresh()">
        Refresh
      </button>
    </span>
  </div>
  <div class="d-flex flex-row justify-content-start w-100-p mt-10p" *ngIf="isTableShow">

    <div class="col-sm-12 table-responsive">
      <div class="row">
        <ng-container>
          <table class="table width-100 table-bordered">

            <colgroup>
              <col style="width: 10%">
              <col style="width: 25%">
              <col style="width: 12%">
              <col style="width: 53%">
            </colgroup>

            <thead>
              <tr>
                <th class="text-align-center">Deviation Type</th>
                <th class="text-align-center">Description</th>
                <th class="text-align-center">Applicable for Customer</th>
                <th class="text-align-center">Justification</th>
              </tr>
            </thead>
            <tr *ngFor="let deviation of deviations">
              <td class="text-align-start">{{deviation.deviationType}}</td>
              <td class="text-align-start">{{deviation.description}}</td>
              <td class="text-align-center">
                <mdb-checkbox [checked]="deviation.checked"
                  (change)="onIsCheckedCCPUChange(deviation.deviationId, $event)"
                  [disabled]="!isDeviationTableEditable"></mdb-checkbox>
              </td>
              <td>
                <textarea class="form-control w-100 custom-textarea" [disabled]="!deviation.checked"
                  [readonly]="!isDeviationTableEditable" [(ngModel)]="deviation.divComment"
                  (change)="onCommentChange()"></textarea>
              </td>
            </tr>
          </table>
        </ng-container>
      </div>
    </div>
  </div>


  <div class="d-flex justify-content-end">
    <span *ngIf="isDeviationTableEditable && isTableShow">
      <button class="btn btn-info me-2" [disabled]="isSaveButtonDissabled" (click)="saveDeviations()">
        Save
      </button>
    </span>
  </div>

  <ng-container *ngIf="!isTableShow">
    <p class="heading-topics">No Deviations</p>
  </ng-container>
</div>

<ng-template #emptyView>
  <p class="heading-topics">No Deviations</p>
</ng-template>
