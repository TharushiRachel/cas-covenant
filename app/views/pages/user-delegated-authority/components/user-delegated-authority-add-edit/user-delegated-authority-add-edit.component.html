<div mdbSticky class="d-flex flex-row justify-content-between page-header">
  <div class="d-flex flex-row align-items-center">
    <a appGoBack
       class="d-flex flex-row align-items-center">
      <i class="fas fa-angle-left header-icon-back"></i>
    </a>
    <h5><i class="fas fa-assistive-listening-systems header-icon"></i>
      <span *ngIf="pageType=='new'">Add User Delegated Authority</span>
      <span *ngIf="pageType=='edit'">Edit User Delegated Authority</span>
    </h5>
  </div>

  <div class="d-flex  justify-content-end">

  </div>

  <div class="d-flex  justify-content-end">
    <ng-container *ngIf="isApproveOrRejectValid()">
      <ng-container *appHasAnyPrivilege="masterDataPrivilege.ADMIN_MASTER_DATA_APPROVE_OR_REJECT">
        <button (click)="approve()"
                mdbBtn
                class="custom-button"
                type="button"
                color="success"
                outline="true"
                [disabled]="isDirty()"
                mdbWavesEffect>
          <span *ngIf="pageType=='edit'">Approve</span>
        </button>
        <button (click)="reject()"
                mdbBtn
                type="button"
                class="custom-button"
                color="danger"
                outline="true"
                [disabled]="isDirty()"
                mdbWavesEffect>
          <span *ngIf="pageType=='edit'">Reject</span>
        </button>
      </ng-container>
    </ng-container>
    <ng-container *appHasAnyPrivilege="masterDataPrivilege.ICAS_SETTINGS_USER_DA_EDIT">
      <button *ngIf="pageType=='edit'" (click)="saveUpdate()"
              class="custom-button"
              mdbBtn
              type="button"
              color="secondary"
              outline="true"
              [disabled]="!isValid() || !isDirty()"
              mdbWavesEffect>
        <span>UPDATE</span>
      </button>
    </ng-container>
    <ng-container *appHasAnyPrivilege="masterDataPrivilege.ICAS_SETTINGS_USER_DA_ADD">
      <button *ngIf="pageType=='new'" (click)="saveUpdate()"
              class="custom-button"
              mdbBtn
              type="button"
              color="secondary"
              outline="true"
              [disabled]="!isValid() || !isDirty()"
              mdbWavesEffect>
        <span>SAVE</span>
      </button>
    </ng-container>
  </div>


</div>

<div class="page-search-section d-flex p-2 flex-column justify-content-start align-items-start">
  <form class="d-flex p-2 flex-column justify-content-start align-items-start w-100-p" [formGroup]="componentForm">

    <div class="md-form m-top-10px m-bottom-10px w-100-p">
      <input mdbValidate type="text" id="userName" maxlength="200" formControlName="userName" class="form-control"
             mdbInput>
      <label for="userName">User Name *</label>
      <mdb-error *ngIf="formErrors.userName.required">User Name required</mdb-error>
      <mdb-error *ngIf="formErrors.userName.maxlength">Maximum length for User Name
        is {{formErrors.userName.maxlength.requiredLength}}</mdb-error>
    </div>

    <div class="md-form m-top-10px m-bottom-10px w-100-p">
      <input mdbValidate type="text" id="maxAmount" maxlength="200" formControlName="maxAmount" class="form-control"
             (focusout)="currencyService.patchFormControllerValue(componentForm, 'maxAmount')"
             mdbInput>
      <label for="maxAmount">Maximum Amount</label>
      <mdb-error *ngIf="formErrors.maxAmount.required">Maximum Amount required</mdb-error>
      <mdb-error *ngIf="formErrors.maxAmount.isCommaSeparatedValueError">Invalid value</mdb-error>
    </div>

       <div class="md-form m-top-10px m-bottom-10px w-100-p">
      <input mdbValidate type="text" id="cleanAmount" maxlength="200" formControlName="cleanAmount" class="form-control"
             (focusout)="currencyService.patchFormControllerValue(componentForm, 'cleanAmount')"
             mdbInput>
      <label for="cleanAmount">Clean Amount</label>
      <mdb-error *ngIf="formErrors.cleanAmount.required">Maximum Amount required</mdb-error>
      <mdb-error *ngIf="formErrors.cleanAmount.isCommaSeparatedValueError">Invalid value</mdb-error>
    </div>

    <div class="md-form m-top-10px m-bottom-10px w-100-p">
      <input mdbValidate type="text" id="description" maxlength="200" formControlName="description" class="form-control"
             (keydown)="tabPressDisabled($event)"
             mdbInput>
      <label for="description">Description *</label>
      <mdb-error *ngIf="formErrors.description.required">Description required</mdb-error>
    </div>

    <div class="md-form m-top-10px m-bottom-10px w-100-p">
      <mdb-select
        [options]="optionsSelect"
        formControlName="status"
        id="status"
        placeholder="Status"></mdb-select>
      <label for="status">Status</label>
      <mdb-error *ngIf="formErrors.status.required">Status required</mdb-error>
    </div>
    <ng-container *ngIf="pageType=='edit'" class="w-100-p">
      <app-trackeble-info class="w-100-p"
                          [updateDTO]="userDelegatedAuthorityUpdateDTO">
      </app-trackeble-info>
    </ng-container>
  </form>
</div>
