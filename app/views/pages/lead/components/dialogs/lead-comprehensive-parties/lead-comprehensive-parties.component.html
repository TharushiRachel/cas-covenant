<div class="modal-header modal-topic">
  <h4 class="modal-title w-100 font-weight-bold">Add Related Parties</h4>
  <button type="button" class="close" data-dismiss="modal" aria-label="Close" (click)="onCloseModel()">
    <span aria-hidden="true">&times;</span>
  </button>
</div>

<div class="modal-body height-300 mx-3 modal-detail form-margin">
  <form class="d-flex p-2 flex-column justify-content-start align-items-start w-100-p"
    [formGroup]="addRelatedPartiesForm">

    <div class="d-flex w-100-p justify-content-between p-2">
      <div class="md-form w-50-p mx-2">
        <mdb-select formControlName="mainParty" [options]="mainPartyOptions" class="form-control py-0"
          label="{{getFirstDropDownLable()}} *" textNoResults="Please select Party!">
        </mdb-select>
      </div>
      <div class="md-form w-50-p mx-2">
        <mdb-select formControlName="relatedParty" [options]="relatedPartyOptions" class="form-control py-0"
          label="{{getSecondDropDownLable()}}" textNoResults="Please select Party!">
        </mdb-select>
      </div>
    </div>

    <div class="d-flex w-100-p justify-content-between p-2">
      <div class="md-form w-50-p mx-2">
        <mdb-select formControlName="relationshipDescription" [options]="relationShipOptions" class="form-control py-0"
          label="Relationship *" textNoResults="No relationship found!">
        </mdb-select>
      </div>
      <div class="md-form w-50-p mx-2">
        <ng-container *ngIf="isEnableShare">
          <input mdbValidate type="number" id="share" formControlName="share" class="form-control" mdbInput />
          <label for="share *">Share *</label>
        </ng-container>
      </div>
    </div>

  </form>
</div>

<div class="modal-footer modal-end">
  <button type="button" mdbBtn color="secondary" class="relative waves-light" mdbWavesEffect size="sm" (click)="save()"
    [disabled]="!isValid()">Save
  </button>
</div>
